name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Whitespace check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1000
            if git merge-base "origin/${{ github.base_ref }}" HEAD >/dev/null; then
              git diff --check "origin/${{ github.base_ref }}...HEAD"
            else
              echo "No merge base found; checking latest commit for whitespace."
              git diff-tree --check --no-commit-id -r HEAD
            fi
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi
      - name: Source layout check
        run: |
          python3 - <<'PY'
          from pathlib import Path

          targets = list(Path("src").rglob("*.java")) + list(Path(".github").rglob("*.yml"))
          bad = []
          bidi_chars = "\u202a\u202b\u202c\u202d\u202e\u2066\u2067\u2068\u2069"

          for path in targets:
              text = path.read_text(encoding="utf-8", errors="ignore")
              lines = text.splitlines()
              if len(lines) <= 3:
                  bad.append(f"{path}: collapsed file with {len(lines)} lines")
              for index, line in enumerate(lines, start=1):
                  if len(line) > 180:
                      bad.append(f"{path}:{index}: line length {len(line)}")
                  if any(char in line for char in bidi_chars):
                      bad.append(f"{path}:{index}: hidden bidi unicode character")

          if bad:
              print("Source layout issues:")
              for issue in bad:
                  print(issue)
              raise SystemExit(1)

          print(f"OK: checked {len(targets)} files")
          PY
      - name: Test
        run: ./gradlew test --no-daemon
      - name: Build
        run: ./gradlew build --no-daemon
      - name: Upload Gradle test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-reports
          path: |
            build/reports/tests/test
            build/test-results/test
          if-no-files-found: ignore
      - name: Script syntax check
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/reports/evidence

          if [ -f scripts/run-full-mixed-evidence.sh ]; then
            bash -n scripts/run-full-mixed-evidence.sh
            echo "bash -n scripts/run-full-mixed-evidence.sh passed" \
              | tee build/reports/evidence/run-full-mixed-evidence.syntax.txt
          fi
          if [ -f scripts/validate-k6-full-mixed-summary.mjs ]; then
            node --check scripts/validate-k6-full-mixed-summary.mjs 2>&1 \
              | tee build/reports/evidence/validate-k6-full-mixed-summary.node-check.txt
            node --check scripts/summarize-full-mixed-evidence.mjs 2>&1 \
              | tee build/reports/evidence/summarize-full-mixed-evidence.node-check.txt
            node --check scripts/test-k6-evidence-tools.mjs 2>&1 \
              | tee build/reports/evidence/test-k6-evidence-tools.node-check.txt

            node scripts/validate-k6-full-mixed-summary.mjs \
              docs/evidence/k6/mixed-usage-full-20260522081328-summary.json 2>&1 \
              | tee build/reports/evidence/full-mixed-current-validation.txt

            if node scripts/validate-k6-full-mixed-summary.mjs \
              docs/evidence/k6/mixed-usage-full-20260522080203-summary.json \
              > build/reports/evidence/full-mixed-superseded-validation.txt 2>&1; then
              cat build/reports/evidence/full-mixed-superseded-validation.txt
              echo "Expected superseded diagnostic summary validation to fail" >&2
              exit 1
            else
              cat build/reports/evidence/full-mixed-superseded-validation.txt
            fi

            node scripts/test-k6-evidence-tools.mjs 2>&1 \
              | tee build/reports/evidence/k6-evidence-tools-test.txt
          fi
      - name: Upload k6 evidence validator outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-evidence-validator-outputs
          path: |
            build/reports/evidence
            docs/evidence/K6_EVIDENCE_MANIFEST.md
            docs/evidence/k6/*summary.json
          if-no-files-found: ignore
      - name: k6 inspect
        run: |
          if [ -f k6/mixed-usage-test.js ]; then
            docker run --rm -v "$PWD:/work" -w /work grafana/k6 inspect k6/mixed-usage-test.js
            docker run --rm -v "$PWD:/work" -w /work grafana/k6 inspect \
              -e K6_REQUIRE_OPTIONAL_PATHS=true \
              k6/mixed-usage-test.js
          else
            echo "No k6 script yet"
          fi
