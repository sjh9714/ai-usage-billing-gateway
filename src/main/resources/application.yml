spring:
  application:
    name: ai-usage-billing-gateway
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_usage_billing
    username: ai_usage_billing
    password: ai_usage_billing
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: never
  flyway:
    enabled: true

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:local-dev-jwt-secret-change-me-with-at-least-32-bytes}
    ttl-seconds: 3600

payment:
  webhook-secret: ${PAYMENT_WEBHOOK_SECRET:local-dev-webhook-secret}

gateway:
  rate-limit-per-minute: 60

billing:
  invoice-scheduler:
    enabled: false
    cron: "0 10 0 1 * *"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
