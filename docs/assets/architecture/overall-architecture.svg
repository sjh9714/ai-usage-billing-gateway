<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AI Usage Billing Gateway overall architecture</title>
  <desc id="desc">Simplified architecture diagram for API key auth, gateway idempotency, quota reservation, invoice, webhook, ledger, audit, and PostgreSQL persistence.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
      .accent { fill: #eff6ff; stroke: #2563eb; }
      .data { fill: #f0fdf4; stroke: #16a34a; }
      .external { fill: #fff7ed; stroke: #ea580c; }
      .audit { fill: #fdf2f8; stroke: #db2777; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #0f172a; font-weight: 700; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #334155; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #475569; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 26px; fill: #0f172a; font-weight: 700; }
      .line { stroke: #1f2937; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 7 6; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760"/>
  <text class="title" x="48" y="52">AI Usage Billing Gateway 전체 아키텍처</text>
  <text class="small" x="48" y="78">핵심 흐름과 검증 대상 경계를 설명하는 단순화된 구조도</text>

